# ==============================================================================
# TMUX CONFIGURATION (Annotated)
#
# This file contains the configuration for tmux, the terminal multiplexer.
# It is used to customize the appearance and behavior of tmux sessions.
# ==============================================================================

# --- Color Hex Codes (Catppuccin Macchiato/Mocha Palette) ---
# These lines define custom tmux variables (prefixed with @) to store hex codes.
# These variables are used later in the status bar to ensure a consistent theme.

set -g @ROSEWATER "#f2d5cf"
set -g @FLAMINGO  "#eebebe"
set -g @PINK      "#f4b8e4"
set -g @MAUVE     "#ca9ee6"
set -g @RED       "#e78284"
set -g @MAROON    "#ea999c"
set -g @PEACH     "#ef9f76"
set -g @YELLOW    "#e5c890"
set -g @GREEN     "#a6d189"
set -g @TEAL      "#81c8be"
set -g @SKY       "#99d1db"
set -g @SAPPHIRE  "#85c1dc"
set -g @BLUE      "#8caaee"
set -g @LAVENDER  "#babbf1"
set -g @TEXT      "#c6d0f5"
set -g @SUBTEXT_1 "#b5bfe2"
set -g @SUBTEXT_0 "#a5adce"
set -g @OVERLAY_2 "#949cbb"
set -g @OVERLAY_1 "#838ba7"
set -g @OVERLAY_0 "#737994"
set -g @SURFACE_2 "#626880"
set -g @SURFACE_1 "#51576d"
set -g @SURFACE_0 "#414559"
set -g @BASE      "#303446"
set -g @MANTLE    "#292c3c"
set -g @CRUST     "#232634"

# --- General Settings ---

# Enables mouse support for clicking, resizing panes, and scrolling.
set -g mouse on

# Starts window numbering at 1 instead of 0 (matches keyboard row).
set -g base-index 1

# Starts pane numbering at 1 instead of 0.
set -g pane-base-index 1

# --- Key Bindings ---

# Explicitly restores 'Prefix + d' to detach the client (standard behavior).
bind-key d detach-client

# Prefix + u: Toggles a custom @status_debug variable (0 or 1).
# Used to enable/disable debug information in the status bar dynamically.
bind-key u run-shell 'if [ "$(tmux show-option -gv @status_debug)" = "1" ]; then tmux set-option -g @status_debug 0; else tmux set-option -g @status_debug 1; fi'

# Prefix + r: Reloads this configuration file from its local path.
bind-key r source ~/.config/tmux/tmux.conf

# --- High-Visibility Aesthetic Status Bar ---

# Updates the status bar every 1 second (useful for CPU/RAM monitoring).
set-option -g status-interval 1

# Places the status bar at the bottom of the screen.
set-option -g status-position bottom

# Sets global background to @CRUST (dark) and foreground to @TEXT (light).
set-option -g status-style bg='#{@CRUST}',fg='#{@TEXT}'

# --- Status Left: [ 🚀 SESSION_NAME ] ---
# #S is the session name. Uses Nerd Font Powerline symbols (\ue0BA, \ue0BC).
set-option -g status-left "#[bg=#{@CRUST},fg=#{@ROSEWATER}]\ue0BA#[bg=#{@ROSEWATER},fg=#{@CRUST},bold] 🚀 #S #[bg=#{@CRUST},fg=#{@ROSEWATER}]\ue0BC "
set-option -g status-left-length 30

# --- Window List (Tabs) ---

# Inactive Windows: Uses @OVERLAY_1 (muted grey-blue).
set-option -g window-status-format "#[bg=#{@CRUST},fg=#{@OVERLAY_1}]\ue0B2#[bg=#{@OVERLAY_1},fg=#{@CRUST}] 🖥️ #I #W #[bg=#{@CRUST},fg=#{@OVERLAY_1}]\ue0B0"

# Active Window: Uses @MAUVE (purple) and bold text to stand out.
set-option -g window-status-current-format "#[bg=#{@CRUST},fg=#{@MAUVE}]\ue0B6#[bg=#{@MAUVE},fg=#{@CRUST},bold] 🖥️ #I #W #[bg=#{@CRUST},fg=#{@MAUVE}]\ue0B4"

# Adds a space between window tabs.
set-option -g window-status-separator " "

# --- Status Right: | ⚡ CPU% | 🧠 RAM% | DATE TIME | ---
# CPU: Uses 'top' to calculate current load.
# RAM: Uses 'free' to calculate memory usage percentage.
set-option -g status-right-length 100
set-option -g status-right "#[bg=#{@CRUST},fg=#{@PEACH}]\ue0B2#[bg=#{@PEACH},fg=#{@CRUST},bold] ⚡️ #(top -bn1 | grep 'Cpu(s)' | awk -F, '{print $4}' | awk '{printf \"%.1f%%%%\", 100 - $1}') #[bg=#{@PEACH},fg=#{@MAUVE}]\ue0B2#[bg=#{@MAUVE},fg=#{@CRUST},bold] 🧠 #(free | grep Mem | awk '{print int($3/$2 * 100.0)\"%%\"}') #[bg=#{@MAUVE},fg=#{@SKY}]\ue0B2#[bg=#{@SKY},fg=#{@CRUST},bold] %b %d, %Y "

# --- Automatic Window Naming ---
# Automatically renames windows based on the current process or directory.

set-option -g automatic-rename on
set-window-option -g automatic-rename on

# Format logic: current running command and append the Git branch (e.g., backend:nvim[feature/login])
# Standard fallback: uses the basename of the current directory (or the command name if not in a shell)
set-option -g automatic-rename-format "#{b:pane_current_path}:#{pane_current_command}:#{pane_current_command}#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null | awk '{print \"[\"$1\"]\"}')"